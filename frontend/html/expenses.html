<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expenses | Wallet View</title>
  <link rel="stylesheet" href="../css/expenses.css">
</head>
<body>

<header class="topbar">
  <img src="../assets/images/logo.png" alt="Logo" class="topbar-logo">
  <h2>Expenses</h2>
  <a href="dashboard.html">← Dashboard</a>
</header>

<main class="container">

  <section class="card">
    <h3>Add Expense</h3>
    <input type="text"   id="expName"   placeholder="Expense Name">
    <input type="number" id="expAmount" placeholder="Amount (₹)">
    <button onclick="addExpense()">Add Expense</button>
  </section>

  <section class="card">
    <h3>Your Expenses</h3>
    <ul id="expenseList"></ul>
    <p class="total">Total: ₹<span id="totalExpenses">0</span></p>
  </section>

</main>

<script src="../js/auth.js"></script>
<script src="../js/expenses.js"></script>
</body>
</html>
