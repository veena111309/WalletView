<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings | Wallet View</title>
  <link rel="stylesheet" href="../css/expenses.css">
  <style>
    .danger-btn  { background:crimson; color:#fff; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; font-size:14px; margin-top:8px; }
    .logout-btn  { background:#3A1C5A; color:#fff; border:none; padding:12px; border-radius:10px; cursor:pointer; font-size:15px; width:100%; margin-top:10px; }
    .user-badge  { background:linear-gradient(135deg,#3A1C5A,#E83E8C); color:#fff; border-radius:50%; width:60px; height:60px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; margin:0 auto 10px; }
    .user-info   { text-align:center; margin-bottom:15px; }
    .user-info p { color:#3A1C5A; font-weight:500; }
  </style>
</head>
<body>

<header class="topbar">
  <img src="../assets/images/logo.png" alt="Logo" class="topbar-logo">
  <h2>Settings</h2>
  <a href="dashboard.html">← Dashboard</a>
</header>

<main class="container">

  <section class="card">
    <div class="user-info">
      <div class="user-badge" id="userInitial">?</div>
      <p>Logged in as: <strong><span id="usernameDisplay">—</span></strong></p>
    </div>
  </section>

  <section class="card">
    <h3>Change Password</h3>
    <input type="password" id="oldPass"  placeholder="Current Password">
    <input type="password" id="newPass"  placeholder="New Password">
    <input type="password" id="confPass" placeholder="Confirm New Password">
    <button onclick="changePassword()">Update Password</button>
  </section>

  <section class="card">
    <h3>Data Management</h3>
    <p style="color:#888; font-size:13px; margin-bottom:10px;">These actions cannot be undone.</p>
    <button class="danger-btn" onclick="clearMonthData()">🗑 Clear This Month's Data</button><br>
    <button class="danger-btn" onclick="clearAllData()" style="margin-top:8px;">⚠️ Clear ALL My Data</button>
  </section>

  <section class="card">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </section>

</main>

<script src="../js/auth.js"></script>
<script src="../js/settings.js"></script>
</body>
</html>
